services:
  nginx:
    image: ghcr.io/fyodor-volk/nginx_tg_app:${GITHUB_SHA}
    build:
      context: ./nginx
    environment:
      PROXY_DOMAIN: ${PROXY_DOMAIN:-_}
    ports:
      - "80:80"
    depends_on:
      - frontend

#  db:
#   image: ghcr.io/fyodor-volk/postgres_tg_app:${GITHUB_SHA}
#    build:
#      context: ./db
#    environment:
#      POSTGRES_DB: fitness_diary
#      POSTGRES_USER: postgres
#      POSTGRES_PASSWORD: postgres
#    ports:
#      - "5432:5432"
#    volumes:
#      - pgdata:/var/lib/postgresql/data

  backend:
    image: ghcr.io/fyodor-volk/backend_tg_app:${GITHUB_SHA}
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/fitness_diary
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-CHANGE_ME}
      DEBUG: "true"
#    depends_on:
#      - db
    ports:
      - "8000:8000"

  frontend:
    image: ghcr.io/fyodor-volk/frontend_tg_app:${GITHUB_SHA}
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "8080:80"

  telegram:
    image: ghcr.io/fyodor-volk/telegram_tg_app:${GITHUB_SHA}
    build:
      context: ./telegram
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NOTIFY_INTERVAL_SECONDS: ${NOTIFY_INTERVAL_SECONDS:-0}
    depends_on:
      - backend

volumes:
  pgdata:
